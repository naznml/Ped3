function chunk(arr,size){
  const out=[];
  for(let i=0;i<arr.length;i+=size){
    out.push({
      title:"Вариант "+(out.length+1),
      items:arr.slice(i,i+size)
    });
  }
  return out;
}

const DATA=chunk(QUESTIONS,30);

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function render(){
  const nav=document.getElementById("nav");
  const app=document.getElementById("app");

  nav.innerHTML=DATA.map((v,i)=>`<a href="#v${i+1}">${v.title}</a>`).join("");

  app.innerHTML=DATA.map((variant,vi)=>{
    const questions=variant.items.map((item,qi)=>{
      item.options=shuffle(item.options);
      item.correctIndex=item.options.indexOf(item.a);

      return `
        <div class="q">
          <div class="qtitle">${qi+1}. ${item.q}</div>
          ${item.options.map((opt,oi)=>`
            <label class="opt">
              <input type="radio" name="v${vi}-q${qi}" value="${oi}">
              ${String.fromCharCode(65+oi)}) ${opt}
            </label>
          `).join("")}
        </div>
      `;
    }).join("");

    return `
      <section class="card" id="v${vi+1}">
        <div class="head">
          <div>
            <h2>${variant.title}</h2>
            <div class="desc">Бұл вариантта ${variant.items.length} сұрақ бар. Барлық сұраққа жауап беріп, соңында нәтижені көріңіз.</div>
          </div>
          <span class="badge">${variant.items.length} сұрақ</span>
        </div>

        ${questions}

        <button class="btn" onclick="checkVariant(${vi})">Нәтижені көрсету</button>
        <div class="result" id="result-${vi}"></div>
      </section>
    `;
  }).join("")+`
    <div class="footer">
      © @elnazm_ln — Бұл сайтты көшіруге, қайта сатуға және таратуға тыйым салынады.
    </div>
  `;
}

function explain(q,a){
  const text=(q+" "+a).toLowerCase();

  if(text.includes("метатан") || text.includes("өзін-өзі реттеу") || text.includes("флейвелл")){
    return "Бұл сұрақ метатану және өзін-өзі реттеу тақырыбына қатысты. Дұрыс жауап оқушының өз оқуын бақылауы, бағалауы және реттеуімен байланысты.";
  }

  if(text.includes("бағалау") || text.includes("кері байланыс") || text.includes("форматив") || text.includes("жиынтық")){
    return "Бұл сұрақ бағалау тақырыбына қатысты. Бағалау оқу нәтижесін анықтау, кері байланыс беру және келесі оқу қадамын белгілеу үшін қолданылады.";
  }

  if(text.includes("диалог") || text.includes("әңгіме") || text.includes("мерсер") || text.includes("александер") || text.includes("барнс")){
    return "Бұл сұрақ диалогтік оқытуға қатысты. Диалог арқылы оқушылар пікір алмасады, дәлелдейді және бірлесіп білім құрады.";
  }

  if(text.includes("выготский") || text.includes("жақын арадағы даму") || text.includes("қолдау")){
    return "Бұл жауап Выготскийдің әлеуметтік-мәдени теориясымен байланысты. Оқушы ересек немесе қабілетті құрдастың көмегімен жақсырақ дамиды.";
  }

  if(text.includes("маслоу") || text.includes("роджерс") || text.includes("гуманистік")){
    return "Бұл сұрақ гуманистік тәсілге қатысты. Бұл бағытта адамның тұлғалық өсуі, қажеттілігі және өзін-өзі дамытуы маңызды.";
  }

  if(text.includes("пиаге") || text.includes("когнитив") || text.includes("ассимиляция")){
    return "Бұл сұрақ когнитивтік даму теориясына қатысты. Пиаже баланың ойлау және танымдық даму үдерісін зерттеген.";
  }

  if(text.includes("шульман") || text.includes("педагогикалық білім") || text.includes("пәндік білім")){
    return "Бұл сұрақ Шульманның мұғалім құзыреттілігі туралы идеяларымен байланысты. Мұнда пәндік, педагогикалық және тәжірибелік білім маңызды.";
  }

  if(text.includes("акт") || text.includes("сандық") || text.includes("подкаст") || text.includes("moodle") || text.includes("wiki")){
    return "Бұл сұрақ АКТ және сандық сауаттылық тақырыбына қатысты. Сандық құралдар оқу материалын ұйымдастыруға және оқушының оқуын қолдауға көмектеседі.";
  }

  if(text.includes("дарын") || text.includes("талант") || text.includes("фриман") || text.includes("инклюзив")){
    return "Бұл сұрақ талантты және дарынды оқушыларды анықтау мен қолдауға қатысты. Дұрыс жауап оқушы қабілетін дамытуға бағытталған тәсілді көрсетеді.";
  }

  if(text.includes("блум") || text.includes("таксономия") || text.includes("сыни")){
    return "Бұл сұрақ ойлау дағдылары мен Блум таксономиясына қатысты. Дұрыс жауап төмен деңгейлі ойлаудан жоғары деңгейлі ойлауға дамуды көрсетеді.";
  }

  return "Бұл жауап сұрақтағы негізгі ұғымға сәйкес келеді және педагогикалық мазмұн жағынан дұрыс нұсқаны көрсетеді.";
}

function checkVariant(vi){
  const variant=DATA[vi];
  const box=document.getElementById("result-"+vi);

  let score=0;
  let html="";

  variant.items.forEach((item,qi)=>{
    const selected=document.querySelector(`input[name="v${vi}-q${qi}"]:checked`);
    const selectedIndex=selected ? Number(selected.value) : -1;
    const ok=selectedIndex===item.correctIndex;

    if(ok) score++;

    const yourAnswer=selectedIndex>=0
      ? `${String.fromCharCode(65+selectedIndex)}) ${item.options[selectedIndex]}`
      : "Жауап таңдалмаған";

    const correctAnswer=`${String.fromCharCode(65+item.correctIndex)}) ${item.a}`;

    html+=`
      <div class="ans ${ok ? "ok" : "bad"}">
        <div><b>${qi+1}. ${item.q}</b></div>
        <div class="${ok ? "oktxt" : "badtxt"}">${ok ? "Дұрыс" : "Қате"}</div>

        <div class="ex"><b>Сіздің жауабыңыз:</b><br>${yourAnswer}</div>
        <div class="ex"><b>Дұрыс жауап:</b><br>${correctAnswer}</div>
        <div class="ex"><b>Түсіндірме:</b><br>${explain(item.q,item.a)}</div>
      </div>
    `;
  });

  const percent=Math.round(score/variant.items.length*100);

  box.innerHTML=`
    <div class="summary">
      <h3>${score} / ${variant.items.length} дұрыс</h3>
      <p>Нәтиже: <b>${percent}%</b></p>
    </div>
    ${html}
  `;

  box.scrollIntoView({behavior:"smooth",block:"start"});
}

render();

document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("dragstart",e=>e.preventDefault());

document.addEventListener("keydown",function(e){
  const k=e.key.toUpperCase();
  if(
    e.key==="F12" ||
    (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(k)) ||
    (e.ctrlKey && ["U","S","P","A","C"].includes(k))
  ){
    e.preventDefault();
  }
});
